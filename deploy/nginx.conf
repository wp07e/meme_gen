# nginx site config for meme_gen — vid.abdspros.com
#
# Install on the VPS:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/vid.abdspros.com
#   sudo ln -s /etc/nginx/sites-available/vid.abdspros.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Obtain the certificate:
#   sudo certbot --nginx -d vid.abdspros.com
#
# After Certbot has issued the certificate, this configuration can remain
# unchanged. Certbot will renew the certificate automatically.

# Increase per-server file upload limit here, too, if you change it below.
client_max_body_size 50M;

# --------------------------------------------------------------------------- #
# HTTP → HTTPS redirect, with a Certbot challenge passthrough so renewals work.
# --------------------------------------------------------------------------- #
server {
    listen 80;
    listen [::]:80;

    server_name vid.abdspros.com;

    # Let's Encrypt HTTP-01 challenge (used by certbot issue + auto-renew).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --------------------------------------------------------------------------- #
# HTTPS — nginx terminates TLS and proxies to gunicorn on 127.0.0.1:8000
# --------------------------------------------------------------------------- #
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name vid.abdspros.com;

    # Let's Encrypt certificates
    ssl_certificate     /etc/letsencrypt/live/vid.abdspros.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vid.abdspros.com/privkey.pem;

    # Managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;

    # Gzip text responses from the app (JSON API + HTML shell).
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # -----------------------------------------------------------------------
    # Reverse proxy to gunicorn/uvicorn
    # -----------------------------------------------------------------------
    location / {

        proxy_pass http://127.0.0.1:8000;

        # Preserve request information.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_request_buffering off;
    }

    # Large uploads (asset bundles).
    location /api/bundles {

        client_max_body_size 50M;

        proxy_pass http://127.0.0.1:8000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}