<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>meme_gen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-weight: 600; }
    input, select, textarea, button { width: 100%; padding: 0.5rem; font-size: 1rem; box-sizing: border-box; }
    button { margin-top: 1rem; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
    .row { display: flex; gap: 1rem; }
    .row > * { flex: 1; }
    .radios { display: flex; gap: 1rem; margin-top: 0.25rem; }
    .radios label { font-weight: 400; margin: 0; display: flex; gap: 0.3rem; align-items: center; }
    .radios input { width: auto; }
    pre { background: #f4f4f4; padding: 0.75rem; white-space: pre-wrap; border-radius: 6px; }
    video { width: 100%; margin-top: 1rem; border-radius: 8px; }
    .hidden { display: none; }
    #status { margin-top: 1rem; font-weight: 600; min-height: 1.4em; }
    #cancelBtn { background: #c33; color: white; margin-top: 0.5rem; width: auto; padding: 0.4rem 1rem; }
    #cancelBtn:disabled { background: #999; }
  </style>
</head>
<body>
  <h1>meme_gen</h1>

  <label for="topic">Topic / theme</label>
  <input id="topic" placeholder="e.g. Monday motivation, gym" />

  <label for="clipKeyword" style="margin-top:0.75rem;">Clip search keyword <span style="font-weight:400; color:#888;">(optional — used to search Giphy/Klipy; defaults to topic)</span></label>
  <input id="clipKeyword" placeholder="e.g. workout, monday, tired" />

  <div class="row">
    <div>
      <label for="tone">Tone</label>
      <select id="tone">
        <option>funny</option>
        <option>motivational</option>
        <option>relatable</option>
        <option>wholesome</option>
      </select>
    </div>
    <div>
      <label for="template">Template</label>
      <select id="template"></select>
    </div>
  </div>

  <label style="margin-top:0.75rem;">Format</label>
  <div class="radios" id="formatPref">
    <label><input type="radio" name="format" value="auto" checked /> Auto (clip → GIF fallback)</label>
    <label><input type="radio" name="format" value="clip" /> Clip (video)</label>
    <label><input type="radio" name="format" value="gif" /> GIF (animated)</label>
  </div>

  <button id="previewBtn">1. Preview copy (AI)</button>
  <div id="copyBox" class="hidden">
    <label>Generated copy (edit freely, then render):</label>
    <textarea id="copyJson" rows="8"></textarea>
    <button id="renderBtn">2. Render video</button>
  </div>

  <div id="status"></div>
  <button id="cancelBtn" class="hidden">Cancel search</button>
  <video id="result" controls class="hidden"></video>

  <script src="/static/app.js"></script>
</body>
</html>
