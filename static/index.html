<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>meme_gen — studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0e0f13" />
  <!-- __GTM_HEAD__ -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231d2029'/%3E%3Crect x='1' y='1' width='62' height='62' rx='13' fill='none' stroke='%23c6ff3a' stroke-width='2'/%3E%3Cpath d='M16 44V20h4.8l7.2 12 7.2-12H40v24h-5V30l-5.2 8.6h-1.6L21 30v14z' fill='%23c6ff3a'/%3E%3C/svg%3E" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16.png" />
  <link rel="apple-touch-icon" href="/static/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Manrope:wght@400..800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
<!-- __GTM_BODY__ -->

<!-- ===================== LOGIN ===================== -->
<section id="login" class="login-screen hidden">
  <div class="login-card">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div class="brand-name">meme_gen</div>
    </div>
    <h1>Sign in</h1>
    <p class="sub">Log in to create and manage your videos.</p>
    <form id="loginForm">
      <div class="field">
        <label for="loginUser">Username</label>
        <input id="loginUser" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="loginPass">Password</label>
        <input id="loginPass" type="password" autocomplete="current-password" required />
      </div>
      <div id="loginError" class="status err hidden" role="alert"></div>
      <button type="submit" class="primary" id="loginBtn" style="margin-top:0.5rem;">Log in</button>
    </form>
  </div>
</section>

<!-- ===================== APP ===================== -->
<section id="app" class="wrap hidden">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div class="brand-name">meme_gen</div>
    </div>
    <div class="user-menu">
      <a href="#" id="adminLink" class="icon-btn hidden" title="Admin">⚙ Admin</a>
      <span class="user-chip"><span class="user-avatar" id="userAvatar">?</span><span id="userName">—</span></span>
      <button class="icon-btn" id="logoutBtn" title="Log out">Log out</button>
    </div>
  </header>

  <nav class="tabs">
    <button data-tab="create" class="active">Create</button>
    <button data-tab="library">Library</button>
  </nav>

  <!-- ---- Create tab ---- -->
  <div id="tab-create">
    <div class="panel">
      <div class="wizard-head">
        <h2>Create a video</h2>
        <div class="steps" id="stepDots">
          <span class="step-dot active" data-step="1"><b>1</b> Details</span>
          <span class="step-dot" data-step="2"><b>2</b> Caption</span>
          <span class="step-dot" data-step="3"><b>3</b> Render</span>
        </div>
      </div>

      <!-- STEP 1: details up to format -->
      <section id="step-1" class="wizard-step">
        <div class="field">
          <label for="topic">Topic / theme</label>
          <input id="topic" placeholder="e.g. Monday motivation, gym" />
        </div>

        <div class="field">
          <label for="clipKeyword">Clip search keyword <span class="hint">(optional — narrows search; defaults to topic)</span></label>
          <input id="clipKeyword" placeholder="e.g. workout, monday, tired" />
        </div>

        <div class="row-2">
          <div class="field">
            <label for="tone">Tone</label>
            <select id="tone">
              <option>funny</option>
              <option>motivational</option>
              <option>relatable</option>
              <option>wholesome</option>
            </select>
          </div>
          <div class="field">
            <label for="template">Template</label>
            <select id="template"></select>
          </div>
        </div>

        <div class="field">
          <label>Format</label>
          <div class="radios" id="formatPref">
            <label><input type="radio" name="format" value="auto" checked /> Auto</label>
            <label><input type="radio" name="format" value="clip" /> Clip</label>
            <label><input type="radio" name="format" value="gif" /> GIF</label>
          </div>
        </div>

        <div class="field">
          <label><input type="checkbox" id="soundToggle" /> Include sound</label>
        </div>
      </section>

      <!-- STEP 2: AI caption (editable) -->
      <section id="step-2" class="wizard-step hidden">
        <!-- Asset bundles — shown only for the lower-third-brand template -->
        <div id="bundleBox" class="bundle-box hidden">
          <div class="bundle-head">
            <label class="field-label" style="margin:0;">Brand assets
              <span class="help-icon" tabindex="0" role="button"
                aria-label="Help: what to upload"
                title="Upload a brand kit: one transparent PNG for the bottom bar (~1080×160) and one for the top-right watermark (~240×70). Transparent backgrounds work best.">?</span>
            </label>
            <button type="button" class="btn ghost" id="toggleUploadBtn" style="width:auto;padding:.4rem .8rem;font-size:.85rem;">+ Upload</button>
          </div>

          <div id="uploadForm" class="upload-form hidden">
            <div class="field">
              <label for="bundleName">Bundle name</label>
              <input id="bundleName" placeholder="e.g. Summer campaign" />
            </div>
            <div class="row-2">
              <div class="field">
                <label for="bottomBarFile">Bottom bar PNG</label>
                <input id="bottomBarFile" type="file" accept="image/png" />
              </div>
              <div class="field">
                <label for="watermarkFile">Watermark PNG</label>
                <input id="watermarkFile" type="file" accept="image/png" />
              </div>
            </div>
            <div class="add-user-form" style="margin-bottom:0;">
              <button type="button" class="btn primary" id="uploadBundleBtn" style="width:auto;padding:.7rem 1.2rem;">Save bundle</button>
              <div id="uploadMsg" class="status" style="margin:0;"></div>
            </div>
          </div>

          <div id="bundleList" class="bundle-list"></div>
        </div>

        <div class="field">
          <label for="copyJson">Caption (generated by AI — edit freely)</label>
          <textarea id="copyJson" rows="8" placeholder='Click "Generate caption" to draft one with AI, then edit as you like.'></textarea>
        </div>
        <button id="previewBtn" class="btn" style="width:auto;"><span class="step-num">✦</span>Generate caption (AI)</button>
        <div id="copyHint" class="status" style="margin-top:.75rem;"></div>
      </section>

      <!-- STEP 3: render + result -->
      <section id="step-3" class="wizard-step hidden">
        <div id="status" class="status"></div>
        <button id="renderBtn" class="primary" style="margin-top:0;">Render video</button>
        <button id="cancelBtn" class="danger hidden">Cancel search</button>
        <video id="result" controls class="hidden"></video>
        <button id="resetBtn" class="btn ghost hidden" style="margin-top:1rem;width:auto;padding:.6rem 1.2rem;">↺ Start new</button>
      </section>

      <!-- Shared wizard nav -->
      <div class="wizard-nav">
        <button id="prevBtn" class="btn ghost" style="width:auto;">← Previous</button>
        <button id="nextBtn" class="btn primary" style="width:auto;">Next →</button>
      </div>
    </div>
  </div>

  <!-- ---- Library tab ---- -->
  <div id="tab-library" class="hidden">
    <div class="section-head">
      <h2>Your videos</h2>
      <span class="count-pill" id="vidCount">0</span>
    </div>
    <div id="vidGrid" class="grid"></div>
    <div id="bulkBar" class="bulk-bar hidden">
      <span class="sel-count" id="selCount">0 selected</span>
      <button class="btn ghost" id="clearSelBtn">Clear</button>
      <button class="btn danger" id="bulkDeleteBtn">Delete selected</button>
    </div>
  </div>
</section>

<!-- ===================== ADMIN ===================== -->
<section id="admin" class="wrap hidden">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div class="brand-name">meme_gen</div>
    </div>
    <a href="#" id="backToApp" class="icon-btn">← Back to app</a>
  </header>

  <div class="section-head"><h2>Manage users</h2></div>

  <div class="panel admin-card">
    <h2 style="font-size:1rem;">Add a login</h2>
    <form id="addUserForm" class="add-user-form">
      <div class="field">
        <label for="newUser">Username</label>
        <input id="newUser" autocomplete="off" required />
      </div>
      <div class="field">
        <label for="newPass">Password</label>
        <input id="newPass" type="password" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn primary">Add user</button>
    </form>
    <div id="addUserMsg" class="status"></div>
  </div>

  <div class="panel">
    <h2 style="font-size:1rem;">Existing users</h2>
    <div id="userList" class="user-list"></div>
  </div>
</section>

<div id="toast" class="toast hidden"></div>

<script src="/static/app.js"></script>
</body>
</html>
